<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Defender</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 16px;
            border-radius: 6px;
            pointer-events: none;
            font-size: 14px;
            line-height: 1.5;
            z-index: 10;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: pointer;
            z-index: 100;
            user-select: none;
            backdrop-filter: blur(3px);
        }
        .overlay h1 {
            font-size: 72px;
            margin: 0 0 20px 0;
            text-shadow: 3px 3px 8px rgba(0,0,0,0.8);
            color: #ffd700;
            letter-spacing: 2px;
        }
        .overlay .controls {
            font-size: 20px;
            margin-bottom: 40px;
            text-align: center;
            line-height: 1.8;
            background: rgba(0, 0, 0, 0.5);
            padding: 24px 36px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .overlay .prompt {
            font-size: 28px;
            font-weight: bold;
            animation: pulse 1.5s infinite;
            color: #4caf50;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
        }
        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.6; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div id="info">
        <strong>Voxel Defender</strong><br>
        WASD: Move | Q/E: Rotate | R/F: Tilt | Scroll: Zoom<br>
        Click: Place Tower | 1-4: Select
    </div>

    <div id="splash-screen" class="overlay">
        <h1>Voxel Defender</h1>
        <div class="controls">
            <strong>Controls:</strong><br>
            WASD: Move Camera &nbsp;|&nbsp; Q/E: Rotate &nbsp;|&nbsp; R/F: Tilt &nbsp;|&nbsp; Scroll: Zoom<br>
            Click: Place Tower &nbsp;|&nbsp; 1-4: Select Tower Type
        </div>
        <div class="prompt">Click Screen to Start</div>
    </div>

    <div id="pause-screen" class="overlay" style="display: none;">
        <h1>Paused</h1>
        <div class="prompt">Click to Continue</div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
